<!-- LIGHTBOX -->
<div id="lightbox">
  <span class="lb-close">Cerrar</span>
  <div class="lightbox-inner">
    <img id="lightbox-img" src="" alt="" />
    <div class="lightbox-info">
      <div class="lb-title"  id="lb-title"></div>
      <div class="lb-year"   id="lb-year"></div>
      <div class="lb-meta"   id="lb-meta"></div>
    </div>
  </div>
</div>


<script>
  const lb      = document.getElementById('lightbox');
  const lbImg   = document.getElementById('lightbox-img');
  const lbTitle = document.getElementById('lb-title');
  const lbYear  = document.getElementById('lb-year');
  const lbMeta  = document.getElementById('lb-meta');

  function openLightbox(item) {
    const img = item.querySelector('img');
    if (!img) return;
    lbImg.src  = img.src;
    lbImg.alt  = img.alt;
    lbTitle.textContent = item.dataset.title  || '';
    lbYear.textContent  = item.dataset.year   || '';
    lbMeta.innerHTML = [
      item.dataset.dims,
      item.dataset.medium,
      item.dataset.edition
    ].filter(Boolean).join('<br>');
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.work-item').forEach(el => {
    el.addEventListener('click', () => openLightbox(el));
  });

  document.querySelector('.lb-close').addEventListener('click', closeLightbox);

  lb.addEventListener('click', e => {
    if (!e.target.closest('.lightbox-inner')) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>
